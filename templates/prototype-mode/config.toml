# ⚠️ PROTOTYPE MODE CONFIG — LOCAL TESTING ONLY
# Do NOT use this config for production, staging, or shared workspaces.
# This config trades governance depth for local iteration speed while keeping
# the main Codex model user-defined.
#
# Usage: copy to your prototype workspace as .codex/config.toml.
#        Then run `codex --profile prototype` from that workspace.

approval_policy = "never"       # no interruptions — maximum iteration speed
sandbox_mode = "workspace-write"
web_search = "cached"

[agents]
max_threads = 2                 # lean — prototype runs do not need full fan-out
max_depth = 1                   # single layer — no nested sub-orchestration

[sandbox_workspace_write]
writable_roots = []
network_access = false          # local only — do not enable for prototype work

# Prototype profile — activate with: codex --profile prototype
[profiles.prototype]
model_reasoning_effort = "high"     # keep prototype code quality high
approval_policy = "never"
web_search = "cached"

# Notes on prototype config decisions:
#
# model
#   Intentionally omitted. Prototype mode should use the user's selected
#   model, normally a strong orchestrator model such as the global default or
#   a CLI-provided --model value.
#
# approval_policy = "never"
#   Removes all approval interruptions. Use it only for disposable prototype
#   work because this config still allows writes inside the workspace.
#
# network_access = false
#   Prototype code must not reach production services. Keep this false.
#   Use local mocks, fixtures, or disposable local services instead of live
#   external endpoints.
#
# When to upgrade to the full config:
#   Switch back to templates/global-codex/config.toml as soon as:
#   - the prototype is validated and ready for migration
#   - you need multi-agent department routing
#   - you need the full validator + tester gates
