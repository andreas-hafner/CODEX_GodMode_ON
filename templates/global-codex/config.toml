model = "gpt-5.4"
model_reasoning_effort = "high"
personality = "pragmatic"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

[agents]
max_threads = 6
max_depth = 1

[sandbox_workspace_write]
writable_roots = []
network_access = false

[profiles.swiftui]
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
web_search = "cached"

[profiles.web]
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
web_search = "live"

[profiles.flutter]
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
web_search = "cached"

[profiles.review]
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "none"
model_verbosity = "low"
web_search = "cached"

[mcp_servers.playwright]
args = ["@playwright/mcp@latest", "--extension", "--caps", "vision,pdf,devtools"]
command = "npx"

[mcp_servers.playwrightIsolated]
args = [
  "@playwright/mcp@latest",
  "--browser", "chrome",
  "--caps", "vision,pdf,devtools",
  "--output-dir", "__CODEX_HOME__/playwright-output/isolated",
  "--save-trace"
]
command = "npx"

# Disabled on 2026-03-16 because codex-cli 0.27.0 on this Mac failed to parse
# streamable HTTP MCP config entries during `codex exec`.
#
# Re-add HTTP MCP entries after upgrading the local CLI to a version that
# supports `mcp_servers.<id>.url` cleanly in interactive and exec flows.

# Disabled on 2026-03-16 because the local Docker-backed GitHub MCP wrapper
# repeatedly timed out during `codex exec` startup and left hanging container
# processes behind. Use `git` and `gh` directly until the wrapper is stable.

[features]
multi_agent = true
